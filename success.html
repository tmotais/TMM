<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande confirmée — Thibault Motais Media</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080808; color: #d4d0c8; font-family: 'Outfit', sans-serif; font-weight: 300; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.box { text-align: center; max-width: 480px; padding: 48px 32px; }
.icon { font-size: 48px; margin-bottom: 24px; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: #f0ece2; margin-bottom: 16px; }
p { font-size: 14px; color: #5a5a5a; line-height: 1.8; margin-bottom: 32px; }
a { display: inline-block; padding: 12px 32px; background: #C8A96E; color: #000; text-decoration: none; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; transition: background 0.2s; }
a:hover { background: #dabb80; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">✓</div>
  <h1>Commande confirmée</h1>
  <p>Merci pour votre achat ! Vous recevrez un email de confirmation sous peu. Je vous contacterai dans les 48h pour les détails de livraison.</p>
  <a href="/">Retour au site</a>
</div>
</body>
</html>
